<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixGram Elite</title>
    <style>
        :root { --primary: #0dbd8b; --accent: #0095f6; --bg: #fafafa; --border: #dbdbdb; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .navbar { background: white; border-bottom: 1px solid var(--border); width: 100%; padding: 10px 0; position: sticky; top: 0; display: flex; justify-content: center; z-index: 100; }
        .nav-content { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .nav-logo { font-weight: bold; color: var(--primary); font-size: 1.2rem; cursor: pointer; }
        .nav-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: #eee; cursor: pointer; }

        #app-view { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .card { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box; font-size: 14px; outline: none; }
        .search-box { background: #efefef; border: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; }

        .feed-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-btn { flex: 1; padding: 8px; border: 1px solid var(--border); background: white; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; color: #666; }
        .active-toggle { background: var(--primary); color: white; border-color: var(--primary); }

        .btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-follow { background: #efefef; color: black; padding: 5px 12px; border-radius: 4px; font-size: 12px; border: none; cursor: pointer; font-weight: 600; }
        .btn-following { background: var(--primary); color: white; }

        #profile-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        
        .post { background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; padding: 15px; position: relative; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 1px solid #eee; }
        .post-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
        
        .like-btn { background: none; border: 1px solid #ffccd5; border-radius: 20px; padding: 4px 12px; cursor: pointer; font-size: 13px; font-weight: bold; color: #ff4d4d; }
        .liked { background: #ff4d4d !important; color: white !important; }
        .del-btn { color: #ccc; border: none; background: none; font-size: 18px; cursor: pointer; padding: 0 5px; }
        .del-btn:hover { color: #ff4d4d; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-content">
        <div class="nav-logo" onclick="window.location.reload()">MatrixGram</div>
        <img id="nav-avatar-img" src="" class="nav-avatar" onclick="openProfilePage()">
    </div>
</div>

<div id="app-view">
    <input type="text" id="globalSearch" class="search-box" placeholder="Search people or posts..." onkeyup="renderPosts()">
    
    <div class="feed-toggle">
        <button id="btn-all" class="toggle-btn active-toggle" onclick="setFeedMode('all')">Discovery</button>
        <button id="btn-subs" class="toggle-btn" onclick="setFeedMode('following')">Following</button>
    </div>

    <div class="card">
        <textarea id="postText" rows="2" placeholder="What's the status?"></textarea>
        <button class="btn" onclick="sharePost()">Post to Matrix</button>
    </div>
    <div id="feed"></div>
</div>

<div id="profile-page">
    <button onclick="closeProfilePage()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold; margin-bottom:20px;">← Back</button>
    <h2>Profile Settings</h2>
    <input type="text" id="edit-name" placeholder="Display Name">
    <input type="text" id="edit-dp" placeholder="Avatar URL">
    <textarea id="edit-bio" placeholder="Bio"></textarea>
    <button class="btn" onclick="saveFullProfile()">Update Profile</button>
    <button onclick="logout()" style="margin-top:20px; color:red; background:none; border:none; width:100%; cursor:pointer;">Logout Session</button>
</div>

<script>
    const SHIELD_URL = "https://matrixgram-pro.onrender.com"; 
    let allPosts = [], userProfiles = {}, postLikes = {}, userFollows = {}, feedMode = 'all';

    window.onload = () => { if(localStorage.getItem('app_user')) loadFeed(); else location.href='login.html'; };

    function setFeedMode(mode) {
        feedMode = mode;
        document.getElementById('btn-all').classList.toggle('active-toggle', mode === 'all');
        document.getElementById('btn-subs').classList.toggle('active-toggle', mode === 'following');
        renderPosts();
    }

    async function toggleLike(id) {
        const u = localStorage.getItem('app_user');
        const type = postLikes[id]?.has(u) ? "[UNLIKE]" : "[LIKE]";
        await fetch(`${SHIELD_URL}/api/share`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: "SYS_ACTION", message: `${type} ${id} | ${u}` })
        });
        loadFeed();
    }

    async function toggleFollow(target) {
        const u = localStorage.getItem('app_user');
        const type = userFollows[u]?.has(target) ? "[UNFOLLOW]" : "[FOLLOW]";
        await fetch(`${SHIELD_URL}/api/share`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: "SYS_ACTION", message: `${type} ${target} | ${u}` })
        });
        loadFeed();
    }

    async function deletePost(id) {
        if(!confirm("Delete this post permanently?")) return;
        const res = await fetch(`${SHIELD_URL}/api/delete/${id}`, { method: 'DELETE' });
        if(res.ok) loadFeed();
    }

    async function loadFeed() {
        const res = await fetch(`${SHIELD_URL}/api/feed`);
        allPosts = await res.json();
        userProfiles = {}; postLikes = {}; userFollows = {};

        allPosts.forEach(p => {
            if(p.text.includes("[FULL_PROF]")) {
                const parts = p.text.split('[FULL_PROF] ')[1].split(' | ');
                userProfiles[parts[0]] = { name: parts[1], avatar: parts[3] };
            } else if(p.text.includes("[LIKE]")) {
                const parts = p.text.split('[LIKE] ')[1].split(' | ');
                if(!postLikes[parts[0]]) postLikes[parts[0]] = new Set();
                postLikes[parts[0]].add(parts[1]);
            } else if(p.text.includes("[UNLIKE]")) {
                const parts = p.text.split('[UNLIKE] ')[1].split(' | ');
                if(postLikes[parts[0]]) postLikes[parts[0]].delete(parts[1]);
            } else if(p.text.includes("[FOLLOW]")) {
                const parts = p.text.split('[FOLLOW] ')[1].split(' | ');
                if(!userFollows[parts[1]]) userFollows[parts[1]] = new Set();
                userFollows[parts[1]].add(parts[0]);
            } else if(p.text.includes("[UNFOLLOW]")) {
                const parts = p.text.split('[UNFOLLOW] ')[1].split(' | ');
                if(userFollows[parts[1]]) userFollows[parts[1]].delete(parts[0]);
            }
        });

        const curr = localStorage.getItem('app_user');
        const myAvatar = userProfiles[curr]?.avatar || "";
        document.getElementById('nav-avatar-img').src = myAvatar || `https://ui-avatars.com/api/?name=${curr}`;
        renderPosts();
    }

    function renderPosts() {
        const curr = localStorage.getItem('app_user');
        const q = document.getElementById('globalSearch').value.toLowerCase();
        
        // AGGRESSIVE FILTER: Wipes out system chatter (SYS_READ, etc)
        const filtered = allPosts.filter(p => {
            const isSystem = p.text.startsWith("[") || ["SYS_ACTION", "SYS_DATA", "SYS_READ", "SYS_LIKE"].includes(p.user);
            if(isSystem) return false;

            const parts = p.text.split(']: ');
            const user = (parts[0] || "").split(' [IP')[0] || p.user;
            const content = (parts[1] || p.text).toLowerCase();
            const isFollowing = userFollows[curr]?.has(user);

            if(feedMode === 'following' && !isFollowing && user !== curr) return false;
            return content.includes(q) || user.toLowerCase().includes(q);
        });

        document.getElementById('feed').innerHTML = filtered.map(p => {
            const parts = p.text.split(']: '), user = parts[0].split(' [IP')[0], content = parts[1];
            const prof = userProfiles[user] || {};
            const likes = postLikes[p.id] || new Set();
            const isLiked = likes.has(curr);
            const isFollowing = userFollows[curr]?.has(user);

            return `
                <div class="post">
                    <div class="post-header">
                        <div style="display:flex; align-items:center;">
                            <img src="${prof.avatar || 'https://ui-avatars.com/api/?name='+user}" class="avatar-img">
                            <div style="font-weight:bold; font-size:14px;">${prof.name || user}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${user !== curr ? `<button onclick="toggleFollow('${user}')" class="btn-follow ${isFollowing ? 'btn-following' : ''}">${isFollowing ? 'Following' : 'Follow'}</button>` : `<button class="del-btn" onclick="deletePost('${p.id}')">×</button>`}
                        </div>
                    </div>
                    <div style="margin:8px 0; color:#262626;">${content}</div>
                    <div class="post-actions">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${p.id}')">❤️ ${likes.size}</button>
                    </div>
                </div>`;
        }).join('');
    }

    async function sharePost() {
        const val = document.getElementById('postText').value;
        if(!val) return;
        await fetch(`${SHIELD_URL}/api/share`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: localStorage.getItem('app_user'), message: val })
        });
        document.getElementById('postText').value = ""; loadFeed();
    }

    function openProfilePage() { document.getElementById('profile-page').style.display='block'; }
    function closeProfilePage() { document.getElementById('profile-page').style.display='none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>

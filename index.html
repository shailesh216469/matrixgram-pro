<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixGram Elite</title>
    <style>
        :root { --primary: #0dbd8b; --accent: #0095f6; --bg: #f0f2f5; --danger: #f3425f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Layouts */
        .navbar { background: white; border-bottom: 1px solid #dbdbdb; width: 100%; padding: 10px 0; position: sticky; top: 0; display: flex; justify-content: center; z-index: 100; }
        .nav-content { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        #auth-view, #app-view { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; display: none; }
        
        /* Components */
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #dbdbdb; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .post { background: white; border: 1px solid #dbdbdb; border-radius: 12px; margin-bottom: 15px; padding: 15px; }
        .avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #eee; }
        
        /* Modals */
        #profile-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .mod-btn { color: var(--danger); border: 1px solid var(--danger); background: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="nav-bar" class="navbar" style="display:none;">
    <div class="nav-content">
        <b style="color:var(--primary); font-size:1.4rem;">MatrixGram</b>
        <img id="my-avatar" src="" style="width:32px; height:32px; border-radius:50%; cursor:pointer; border: 2px solid var(--primary);" onclick="toggleProfile(true)">
    </div>
</div>

<div id="auth-view">
    <div class="card" style="text-align:center; margin-top:50px;">
        <h2 style="color:var(--primary)">Welcome</h2>
        <input type="text" id="auth-user" placeholder="Enter Username">
        <button class="btn" onclick="login()">Enter MatrixGram</button>
    </div>
</div>

<div id="app-view">
    <input type="text" id="searchInput" placeholder="🔍 Search posts..." onkeyup="render()">
    <div class="card">
        <textarea id="postText" rows="2" placeholder="What's happening?"></textarea>
        <button class="btn" onclick="sendPost()">Post</button>
    </div>
    <div id="feed"></div>
</div>

<div id="profile-page">
    <button onclick="toggleProfile(false)" style="border:none; background:none; color:var(--accent); font-weight:bold;">← Close</button>
    <h2>Admin & Settings</h2>
    <input type="text" id="edit-name" placeholder="Display Name">
    <input type="text" id="edit-pic" placeholder="Avatar URL">
    <button class="btn" style="background:var(--primary)" onclick="saveProfile()">Update Profile</button>
    
    <div style="margin-top:40px; border-top:1px solid #eee; padding-top:20px;">
        <h4 style="color:var(--danger)">Danger Zone</h4>
        <button class="btn" style="background:var(--danger)" onclick="purgeLogs()">🗑️ Purge Feed Ghost Logs</button>
        <button class="btn" style="background:none; color:#666; margin-top:20px;" onclick="logout()">Logout</button>
    </div>
</div>

<script>
    const SHIELD = "https://matrixgram-pro.onrender.com"; 
    const ADMIN = "admin"; // Change this to your admin username
    let state = { feed: [], profiles: {}, likes: {} };

    window.onload = () => {
        if(localStorage.getItem('app_user')) { showApp(); }
        else { document.getElementById('auth-view').style.display = 'block'; }
    };

    function login() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase();
        if(u) { localStorage.setItem('app_user', u); location.reload(); }
    }

    function showApp() {
        document.getElementById('nav-bar').style.display = 'flex';
        document.getElementById('app-view').style.display = 'block';
        sync(); setInterval(sync, 15000);
    }

    async function sync() {
        try {
            const res = await fetch(`${SHIELD}/api/sync`);
            const data = await res.json();
            state.feed = data.feed;
            state.likes = {}; state.profiles = {};
            data.metadata.forEach(m => {
                if(m.includes("[FULL_PROF]")) {
                    const p = m.split(' | ');
                    state.profiles[p[0].split(' ')[1]] = { name: p[1], pic: p[3] };
                } else if(m.includes("[LIKE]")) {
                    const [id, user] = m.split('[LIKE] ')[1].split(' | ');
                    if(!state.likes[id]) state.likes[id] = new Set();
                    state.likes[id].add(user);
                }
            });
            render();
        } catch(e) { console.error("Sync error"); }
    }

    function render() {
        const curr = localStorage.getItem('app_user');
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('my-avatar').src = state.profiles[curr]?.pic || `https://ui-avatars.com/api/?name=${curr}`;

        document.getElementById('feed').innerHTML = state.feed.filter(p => {
            const user = p.text.split(']: ')[0].split(' [IP')[0];
            const content = p.text.split(']: ')[1] || "";
            return user.toLowerCase().includes(q) || content.toLowerCase().includes(q);
        }).map(p => {
            const user = p.text.split(']: ')[0].split(' [IP')[0];
            const content = p.text.split(']: ')[1];
            const prof = state.profiles[user] || {};
            const likes = state.likes[p.id] || new Set();

            return `
                <div class="post">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <div style="display:flex; align-items:center;">
                            <img src="${prof.pic || 'https://ui-avatars.com/api/?name='+user}" class="avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=${user}'">
                            <b>${prof.name || user}</b>
                        </div>
                        ${(curr === ADMIN || curr === user) ? `<button class="mod-btn" onclick="delPost('${p.id}')">Delete</button>` : ''}
                    </div>
                    <div>${content}</div>
                    <button style="background:none; border:none; cursor:pointer; margin-top:10px; color:${likes.has(curr) ? 'red':'#666'}" onclick="like('${p.id}')">❤️ ${likes.size}</button>
                </div>`;
        }).join('');
    }

    async function sendPost() {
        const text = document.getElementById('postText').value;
        if(!text.trim()) return;
        await fetch(`${SHIELD}/api/share`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ username: localStorage.getItem('app_user'), message: text, isSystem: false })
        });
        document.getElementById('postText').value = ""; sync();
    }

    async function like(id) {
        await fetch(`${SHIELD}/api/share`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ isSystem: true, message: `[LIKE] ${id} | ${localStorage.getItem('app_user')}` })
        });
        sync();
    }

    async function saveProfile() {
        const u = localStorage.getItem('app_user');
        const msg = `[FULL_PROF] ${u} | ${document.getElementById('edit-name').value} | bio | ${document.getElementById('edit-pic').value} | 0 | 0 | 0 | 0`;
        await fetch(`${SHIELD}/api/share`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ isSystem: true, message: msg })
        });
        toggleProfile(false); sync();
    }

    async function delPost(id) {
        if(confirm("Delete post?")) { await fetch(`${SHIELD}/api/delete/${id}`, {method:'DELETE'}); sync(); }
    }

    async function purgeLogs() {
        if(confirm("Purge ALL ghost logs from main feed?")) {
            await fetch(`${SHIELD}/api/admin/purge`, {method:'POST'});
            alert("Cleaned!"); location.reload();
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
    function toggleProfile(s) { document.getElementById('profile-page').style.display = s ? 'block' : 'none'; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixGram Admin Pro</title>
    <style>
        :root { --primary: #0dbd8b; --accent: #0095f6; --bg: #fafafa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .navbar { background: white; border-bottom: 1px solid #dbdbdb; width: 100%; padding: 15px 0; position: sticky; top: 0; text-align: center; font-weight: bold; color: var(--primary); z-index: 100; }
        #app-view, #login-view { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .card { background: white; border: 1px solid #dbdbdb; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .admin-panel { background: #333; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .stats-bar { text-align: center; margin-bottom: 15px; font-size: 13px; color: #888; background: #eee; padding: 5px; border-radius: 20px; }
        .post { background: white; border: 1px solid #dbdbdb; border-radius: 8px; margin-bottom: 15px; padding: 15px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .post-user { font-weight: bold; color: var(--primary); }
        .del-btn { color: #ff4d4d; background: none; border: none; font-size: 12px; cursor: pointer; }
        .time { font-size: 10px; color: #999; margin-left: 5px; }
        .toggle-link { text-align: center; font-size: 14px; color: var(--accent); cursor: pointer; display: block; margin-top: 10px; }
        #searchBar { border: 2px solid var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

<div class="navbar">MatrixGram Stealth Control</div>

<div id="login-view">
    <div class="card">
        <h2 id="auth-title">Login</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button class="btn" id="authBtn" onclick="handleAuth()">Enter App</button>
        <span class="toggle-link" onclick="toggleAuth()">New here? Create account</span>
    </div>
</div>

<div id="app-view" style="display:none;">
    <div id="admin-controls" class="admin-panel">
        <h3 style="margin-top:0;">Admin Control Panel</h3>
        <input type="text" id="searchBar" placeholder="Search Matrix Database..." onkeyup="filterFeed()">
        <button onclick="loadFeed()" style="width:100%; margin-top:5px; padding:5px; cursor:pointer;">Refresh All Data</button>
    </div>

    <div class="card">
        <textarea id="postText" rows="2" placeholder="Announce to users..."></textarea>
        <button class="btn" onclick="sharePost()">Post</button>
    </div>

    <div class="stats-bar">
        System Load: <span id="post-count">0</span> records
    </div>

    <div id="feed"></div>
    <button onclick="logout()" style="background:none; border:none; color:#999; width:100%; cursor:pointer; margin-top:20px;">Logout</button>
</div>

<script>
    const SHIELD_URL = "https://matrixgram-pro.onrender.com"; 
    let allPosts = []; // Global store for searching
    let isLoginMode = true;

    // Define your Admin Username here
    const ADMIN_USER = "shailesh2164"; 

    window.onload = () => { if(localStorage.getItem('app_user')) showApp(); };

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('authBtn').innerText = isLoginMode ? "Login" : "Register";
    }

    async function handleAuth() {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        const path = isLoginMode ? '/api/login' : '/api/register';
        const res = await fetch(`${SHIELD_URL}${path}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        });
        if (res.ok) { localStorage.setItem('app_user', u); showApp(); }
        else { alert("Auth Failed"); }
    }

    function showApp() {
        const currentUser = localStorage.getItem('app_user');
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('app-view').style.display = 'block';
        
        // Show Admin Panel only for you
        if(currentUser === ADMIN_USER) {
            document.getElementById('admin-controls').style.display = 'block';
        }
        loadFeed();
    }

    async function loadFeed() {
        const res = await fetch(`${SHIELD_URL}/api/feed`);
        allPosts = await res.json();
        renderPosts(allPosts);
    }

    function renderPosts(postsToDisplay) {
        const currentUser = localStorage.getItem('app_user');
        document.getElementById('post-count').innerText = postsToDisplay.length;

        document.getElementById('feed').innerHTML = postsToDisplay.map(p => {
            const timeStr = new Date(p.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const parts = p.text.split(': ');
            const realUser = parts.length > 1 ? parts[0] : p.user; 
            const messageContent = parts.length > 1 ? parts.slice(1).join(': ') : p.text;

            return `
                <div class="post">
                    <div class="post-header">
                        <div>
                            <span class="post-user">@${realUser}</span>
                            <span class="time">${timeStr}</span>
                        </div>
                        ${currentUser === ADMIN_USER ? `<button class="del-btn" onclick="deletePost('${p.id}')">REDACT</button>` : ''}
                    </div>
                    <p style="margin:0;">${messageContent}</p>
                </div>
            `;
        }).join('');
    }

    // SEARCH DATABASE FUNCTION
    function filterFeed() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const filtered = allPosts.filter(p => p.text.toLowerCase().includes(query));
        renderPosts(filtered);
    }

    async function deletePost(id) {
        if(!confirm("ADMIN ACTION: Redact this record from Matrix?")) return;
        const res = await fetch(`${SHIELD_URL}/api/delete/${id}`, { method: 'DELETE' });
        if(res.ok) loadFeed();
    }

    async function sharePost() {
        const text = document.getElementById('postText').value;
        const user = localStorage.getItem('app_user');
        if(!text.trim()) return;
        await fetch(`${SHIELD_URL}/api/share`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, message: text })
        });
        document.getElementById('postText').value = "";
        loadFeed();
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
